<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #1e293b;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
        }

        .cell:hover {
            background: #334155;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #22c55e;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🎮 Tic Tac Toe</h1>
    <h2 id="status">Player X Turn</h2>

    <div class="board" id="board"></div>

    <button onclick="resetGame()">Restart Game</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const boardDiv = document.getElementById("board");
        const statusText = document.getElementById("status");

        // Create board
        function createBoard() {
            boardDiv.innerHTML = "";
            board.forEach((cell, index) => {
                const div = document.createElement("div");
                div.classList.add("cell");
                div.innerText = cell;
                div.addEventListener("click", () => makeMove(index));
                boardDiv.appendChild(div);
            });
        }

        function makeMove(index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            createBoard();
            checkWinner();

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            if (gameActive) {
                statusText.innerText = "Player " + currentPlayer + " Turn";
            }
        }

        function checkWinner() {
            for (let pattern of winPatterns) {
                let [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    statusText.innerText = "🎉 Player " + board[a] + " Wins!";
                    gameActive = false;
                    return;
                }
            }

            if (!board.includes("")) {
                statusText.innerText = "It's a Draw!";
                gameActive = false;
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusText.innerText = "Player X Turn";
            createBoard();
        }

        createBoard();
    </script>

</body>

</html>
